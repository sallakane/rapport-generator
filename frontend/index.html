<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Générateur de rapport — ATLANTIS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── LOGIN ─────────────────────────────────────────────────── -->
  <div id="view-login" class="view">
    <div class="card login-card">
      <div class="logo">ATLANTIS<span>GEO</span></div>
      <h1>Connexion</h1>
      <form id="form-login">
        <div class="field">
          <label for="username">Identifiant</label>
          <input id="username" type="text" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" autocomplete="current-password" required />
        </div>
        <div id="login-error" class="error hidden"></div>
        <button type="submit" class="btn-primary">Se connecter</button>
      </form>
    </div>
  </div>

  <!-- ── SÉLECTION ─────────────────────────────────────────────── -->
  <div id="view-select" class="view hidden">
    <header class="topbar">
      <div class="logo">ATLANTIS<span>GEO</span></div>
      <button id="btn-logout" class="btn-ghost">Déconnexion</button>
    </header>
    <main class="container">
      <div class="select-header">
        <div>
          <h1>Sélection des chapitres</h1>
          <p class="subtitle">Cochez ce que vous voulez conserver dans le rapport généré.</p>
        </div>
        <div class="select-actions">
          <button id="btn-select-all" class="btn-ghost">Tout sélectionner</button>
          <button id="btn-deselect-all" class="btn-ghost">Tout désélectionner</button>
        </div>
      </div>

      <div id="loading-structure" class="loading">
        <span class="spinner"></span> Chargement de la structure…
      </div>

      <div id="content-pane" class="hidden">
        <div id="chapter-tree"></div>

        <div class="annex-block">
          <h2 class="block-title">Annexes</h2>
          <div id="annex-list"></div>
        </div>
      </div>

      <div class="generate-bar">
        <span id="count-label">0 élément(s) sélectionné(s)</span>
        <button id="btn-generate" class="btn-primary" disabled>
          Générer le document
        </button>
      </div>
      <div id="generate-error" class="error hidden"></div>
      <div id="generate-loading" class="loading hidden">
        <span class="spinner"></span> Génération en cours…
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
